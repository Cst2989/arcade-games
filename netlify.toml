[build]
  base    = "."
  command = "pnpm --filter @osi/invaders build"
  publish = "games/invaders/dist"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH    = "/"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
